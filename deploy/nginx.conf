# Nginx reverse proxy for api.llm-tycoon.menot.run → localhost:4000
# Install: copy to /etc/nginx/sites-available/llm-tycoon, symlink to sites-enabled
# Then: certbot --nginx -d api.llm-tycoon.menot.run

server {
    listen 80;
    server_name api.llm-tycoon.menot.run;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.llm-tycoon.menot.run;

    # Certbot manages these after first run:
    # ssl_certificate /etc/letsencrypt/live/api.llm-tycoon.menot.run/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.llm-tycoon.menot.run/privkey.pem;

    # WebSocket upgrade (critical for game)
    location /socket {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24h — idle game, connections longa vida
        proxy_send_timeout 86400;
    }

    # HTTP endpoints (/health, future REST)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
