# LLM Tycoon — Dev environment
# Postgres + ML service pra development local.
# Frontend e backend Elixir rodam nativos (bun dev / mix phx.server).

services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-tycoon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_tycoon_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml:
    build: ./ml
    container_name: llm-tycoon-ml
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL_STORE_PATH=/data/models
    volumes:
      - ml_data:/data
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
  ml_data:
