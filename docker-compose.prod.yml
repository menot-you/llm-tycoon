# Production compose for nott server.
# Backend (Rust) + ML (Python) on internal Docker network.
# Frontend deployed separately on Vercel.
# DB is external Supabase Postgres (DATABASE_URL env var).

services:
  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    container_name: llm-tycoon-api
    restart: unless-stopped
    depends_on:
      - ml
    networks:
      - llm-tycoon       # internal: backend ↔ ml
      - menot-proxy      # external: caddy reaches us here
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
      - ML_SERVICE_URL=http://llm-tycoon-ml:8000
      - RUST_LOG=${RUST_LOG:-info}
      - BIND_ADDR=0.0.0.0:4000
    # No host port — Caddy proxies directly via menot-proxy network

  web:
    image: nginx:1.27-alpine
    container_name: llm-tycoon-web
    restart: unless-stopped
    networks:
      - llm-tycoon     # same network as backend for DNS resolution
      - menot-proxy
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./deploy/web.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Bind to 127.0.0.1 so only the local cloudflared tunnel can reach it.
      # Using 8088 to avoid the k3s DNAT 0.0.0.0/0:80 → traefik rule.
      - "127.0.0.1:8088:80"

  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: llm-tycoon-ml
    restart: unless-stopped
    networks:
      - llm-tycoon
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MODEL_STORE_PATH=/data/models
    volumes:
      - ml_models:/data

networks:
  llm-tycoon:
    driver: bridge
  menot-proxy:
    external: true

volumes:
  ml_models:
